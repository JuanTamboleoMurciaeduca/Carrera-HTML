<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrera-HTML</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Carrera-HTML</h1>
    <p>Reto de patio</p>
  </header>

  <main>
    <section id="startView" class="card">
      <h2>Inicio</h2>
      <p>Pulsad empezar con el móvil que vais a usar durante toda la carrera.</p>
      <p>Desde ese momento empezará a contar el tiempo y aparecerá la primera adivinanza.</p>
      <button id="startBtn">Empezar</button>
      <p id="startMessage" class="message"></p>
    </section>

    <section id="gameView" class="hidden">
      <div class="topbar card">
        <div>
          <strong id="runLabel">Carrera iniciada</strong>
          <span id="progressLabel"></span>
        </div>
        <div>
          <span id="scoreLabel"></span>
          <span id="timeLabel"></span>
        </div>
      </div>

      <section id="riddleCard" class="card"></section>
      <section id="exerciseCard" class="card hidden"></section>
      <section id="finishCard" class="card hidden"></section>
    </section>

    <section id="teacherView" class="card hidden"></section>
  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
